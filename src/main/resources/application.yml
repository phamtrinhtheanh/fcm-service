server:
  port: 8082
  servlet:
    context-path: /device-config

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/express?currentSchema=device&options=-c%20timezone%3DAsia%2FHo_Chi_Minh
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 16
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 50

device:
  notification:
    kafka:
      topic: device-notification-events
  subscription:
    whitelist: evtman,vtmannew
  firebase:
    retry:
      max-attempts: 3
      delay-ms: 500

firebase:
  project-id: my-top-noti-project
  credentials-path: ./firebase-vtmannew-service-account.json

kafka:
  consumer:
    device-notification:
      group-id: app-noti-backend

app:
  jwt:
    secret: VZ3JM4JSFqVwI7Mn7TCTYezKmy9HnVQY6MTj5G4Cg3aXm2hBq8RkWdLpF9sN1uA0
    expiration-ms: 86400000
